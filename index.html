<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Pet — Asistente de adopción</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:  #1B3A5C;
    --blue:  #2C7BE5;
    --teal:  #0D9488;
    --ice:   #EFF6FF;
    --sky:   #60C4F0;
    --gray1: #F1F5F9;
    --gray2: #94A3B8;
    --gray3: #64748B;
    --text:  #1E293B;
  }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(160deg, #60C4F0 0%, #A8DFF5 40%, #EFF6FF 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .shell {
    width: 100%; max-width: 460px;
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 24px 80px rgba(27,58,92,0.18), 0 4px 16px rgba(27,58,92,0.08);
    overflow: hidden;
    display: flex; flex-direction: column;
    height: 92vh; max-height: 800px;
    position: relative;
  }

  /* HEADER */
  .header {
    background: var(--navy);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .av-wrap {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--sky); overflow: hidden; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.25);
  }
  .av-wrap img { width:100%; height:100%; object-fit:cover; object-position: top center; }
  .h-info { flex:1; }
  .h-name { color:#fff; font-weight:700; font-size:15px; }
  .h-sub  { color:rgba(255,255,255,0.6); font-size:11px; margin-top:2px; display:flex; align-items:center; gap:4px; }
  .odot   { width:6px; height:6px; background:#4ADE80; border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .h-badge{ background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); color:rgba(255,255,255,.85); font-size:10px; padding:3px 9px; border-radius:20px; }

  /* CHAT */
  .chat {
    flex:1; overflow-y:auto; padding:20px 16px 8px;
    display:flex; flex-direction:column; gap:4px; scroll-behavior:smooth;
  }
  .chat::-webkit-scrollbar{width:3px;}
  .chat::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px;}

  /* MESSAGES */
  .mrow {
    display:flex; align-items:flex-end; gap:7px;
    opacity:0; transform:translateY(8px);
    animation:mIn .3s ease forwards;
  }
  @keyframes mIn{to{opacity:1;transform:translateY(0)}}
  .mrow.user{flex-direction:row-reverse;}
  .mav{width:28px;height:28px;border-radius:50%;background:var(--sky);overflow:hidden;flex-shrink:0;margin-bottom:1px;}
  .mav img{width:100%;height:100%;object-fit:cover;object-position:top center;}
  .bub{
    max-width:80%; padding:10px 14px; border-radius:17px;
    font-size:13.5px; line-height:1.55; color:var(--text);
    background:var(--ice); border-bottom-left-radius:3px;
    white-space:pre-line;
  }
  .mrow.user .bub{
    background:var(--navy); color:#fff;
    border-bottom-left-radius:17px; border-bottom-right-radius:3px;
  }

  /* TYPING */
  .trow{display:flex;align-items:flex-end;gap:7px;opacity:0;animation:mIn .3s ease .1s forwards;}
  .tbub{background:var(--ice);border-radius:17px;border-bottom-left-radius:3px;padding:12px 16px;display:flex;gap:4px;align-items:center;}
  .td{width:6px;height:6px;background:var(--gray2);border-radius:50%;animation:bounce 1.2s infinite;}
  .td:nth-child(2){animation-delay:.2s;}
  .td:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

  .divider{text-align:center;font-size:11px;color:var(--gray2);margin:6px 0;display:flex;align-items:center;gap:7px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#E2E8F0;}

  /* OPTIONS */
  .opts-wrap{padding:4px 16px 8px;display:none;flex-direction:column;gap:7px;flex-shrink:0;}
  .opts-lbl{font-size:10.5px;color:var(--gray2);letter-spacing:.4px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{
    background:var(--ice); border:1.5px solid #BFDBFE;
    color:var(--navy); font-size:13px; font-weight:500;
    padding:8px 13px; border-radius:100px; cursor:pointer;
    transition:all .18s; font-family:'Inter',sans-serif;
  }
  .chip.wide{width:100%;text-align:left;border-radius:13px;}
  .chip:hover{background:var(--navy);color:#fff;border-color:var(--navy);}

  /* INPUT */
  .ibar{
    display:flex; align-items:center; gap:9px;
    padding:10px 14px 14px; border-top:1px solid #F1F5F9;
    flex-shrink:0; background:#fff;
  }
  .ibar input{
    flex:1; border:1.5px solid #E2E8F0; border-radius:100px;
    padding:9px 14px; font-size:13px; font-family:'Inter',sans-serif;
    color:var(--text); outline:none; transition:border-color .2s;
    background:var(--gray1);
  }
  .ibar input:focus{border-color:var(--blue);background:#fff;}
  .ibar input::placeholder{color:var(--gray2);}
  .sbtn{
    width:38px;height:38px;border-radius:50%;background:var(--navy);
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:background .2s,transform .1s;
  }
  .sbtn:hover{background:var(--blue);transform:scale(1.05);}
  .sbtn svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}  /* BOTTOM BARS */
  .rbar{padding:6px 16px 2px;display:none;justify-content:center;}
  .rbar.on{display:flex;}
  .rbtn{background:none;border:1.5px solid #CBD5E1;border-radius:100px;padding:6px 16px;font-size:12px;color:var(--gray3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .18s;}
  .rbtn:hover{border-color:var(--navy);color:var(--navy);}

  </style>
</head>

    bot:"La ansiedad por separación es muy común en perros adoptados.\n\nEmpezá con separaciones muy cortas: salís 2 minutos y volvés. Así le mostrás que siempre volvés.\n\nSi el problema es severo, un adiestrador puede ayudar mucho.",

  perro_vet:{

    opts:[{l:"Gracias, lo consulto 🙏",next:"cierre"},{l:"Volver al inicio",next:"start"}]

  perro_cuarto:{
    bot:"Sí, podés dejarlo en tu cuarto sin problema. Muchos perros se adaptan mejor si pueden oír y oler a su familia durante la noche.\n\nSi después querés cambiarlo, hacé el cambio gradual.",
    opts:[{l:"Gracias, muy claro 😊",next:"cierre"}]
  },

  // ── MULTI ──────────────────────────────────────
  multi:{
    bot:"¡Muy bien que lo pensás antes de que llegue! La clave es la presentación gradual.\n\nEl gato y el perro tienen que conocerse primero por el olfato, sin verse.\n\n¿Cuánto tiempo tenés antes de que llegue el perro?",
    opts:[
      {l:"Menos de una semana",next:"multi_urgente"},
      {l:"Una semana o más",next:"multi_tiempo"},

  multi_urgente:{
    bot:"Con poco tiempo, lo esencial:\n\n1. Cuando llegue el perro, que el gato NO esté en el mismo espacio\n2. Intercambiá mantas con el olor de cada uno\n3. Dejá que el gato lo vea desde un lugar alto y seguro\n\nEl gato siempre tiene que poder retirarse.",

  multi_tiempo:{
    bot:"Con una semana tenés tiempo para hacerlo bien 🙌\n\nFase 1 — Olores (2-4 días): intercambiá mantas entre ellos.\n\nFase 2 — Vista sin contacto: que el gato lo vea desde arriba, siempre con opción de irse.\n\nFase 3 — Convivencia supervisada: sesiones cortas con vos presente.",
    opts:[{l:"¿Cuánto dura cada fase?",next:"multi_fases"},{l:"El gato es muy territorial",next:"multi_territ"}]
  },
  multi_ya:{
    bot:"Si ya llegó, no te asustes — se puede manejar.\n\nPor ahora:\n• Separalos en habitaciones distintas\n• Intercambiá sus mantas 2-3 días\n• Empezá la presentación visual con el gato en un lugar alto\n\nEs un paso atrás pero vale la pena.",
    opts:[{l:"¿Qué hago si el gato ataca?",next:"multi_ataque"},{l:"Gracias, lo hago así",next:"cierre"}]
  },
  multi_territ:{
    bot:"Si el gato es muy territorial, la clave es que nunca pierda el control de su espacio:\n\n• El perro no entra al cuarto del gato\n• El gato tiene zonas altas inaccesibles para el perro\n• Arenero y comida en lugares separados\n\nSi puede ignorar al perro cuando quiere, el estrés baja mucho.",
    opts:[{l:"¿Cuánto tardan en llevarse bien?",next:"multi_tiempo_conv"},{l:"Gracias, muy claro 😊",next:"cierre"}]
  },
  multi_fases:{
    bot:"Como referencia:\n\n• Fase 1 (olores): 2-4 días\n• Fase 2 (vista sin contacto): 3-7 días\n• Fase 3 (convivencia supervisada): a partir de la semana 2\n\nNo apures las fases. Si alguno muestra mucho estrés, volvé a la fase anterior.",

  multi_ataque:{
    bot:"Un arañazo de advertencia es comunicación normal — el gato dice \"pará\".\n\nEl problema es la persecución sostenida o ataques repetidos.\n\nSi pasa eso, separalos sin drama y empezá el proceso desde el principio. Si persiste más de dos semanas, consultá con un etólogo.",
    opts:[{l:"Volver al inicio",next:"start"}]
  },
  multi_tiempo_conv:{
    bot:"La expectativa realista:\n\n• Tolerancia mutua: 4-8 semanas\n• Convivencia tranquila: 3-6 meses\n• Amistad real: puede pasar o no\n\nEl objetivo no es que sean mejores amigos, sino que convivan sin estrés. ¡Eso ya es un éxito! 🎉",
    opts:[{l:"Gracias, muy realista 😊",next:"cierre"},{l:"Volver al inicio",next:"start"}]
  },

  // ── EMERGENCIA VETERINARIA ──────────────────────
  vet_urgente:{
    bot:"Entiendo, vamos a buscar ayuda rápido 🚨\n\nPrimero decime: ¿tu mascota está consciente y respira con normalidad?",
    opts:[
      {l:"Sí, pero algo no está bien",next:"vet_pedir_direccion"},
      {l:"No está respirando bien o no reacciona",next:"vet_critico"},
    ]
  },
  vet_critico:{
    bot:"Esto puede ser una emergencia grave. No esperes: trasladá a tu mascota a una clínica veterinaria de urgencias ahora mismo.\n\nMientras te organizás para salir, te ayudo a encontrar la más cercana.",
    opts:[{l:"Ayudame a encontrar una cerca",next:"vet_pedir_direccion"}]
  },
  vet_pedir_direccion:{
    bot:"Para buscarte veterinarias cerca, decime tu dirección o el barrio/zona donde estás (por ejemplo: \"Av. Corrientes 1500, CABA\" o \"Palermo, Buenos Aires\").\n\nEscribila en el cuadro de texto de abajo y enviala 👇",
    opts:[],
    awaitInput:"vet_direccion"
  },
  vet_resultado:{
    // bot text is set dynamically in code (includes the Maps link)
    opts:[{l:"🔄 Volver al inicio",next:"start"}]
  },

  // ── SITUACIONES OCULTAS (solo detectadas por texto libre) ──
  // Estas NO aparecen como botones en el árbol principal.
  // Byte las reconoce si el usuario las escribe con sus propias palabras.

  oc_devolver:{
    bot:"Entiendo que estés pensando en esto, y sé que no es una decisión fácil. Antes que nada quiero decirte algo: la primera semana suele ser, estadísticamente, la más difícil de todo el proceso de adopción — muchas veces lo que parece un problema grande es algo que se acomoda con tiempo.\n\n¿Querés contarme qué es lo que está pasando? A veces ayuda pensarlo en voz alta antes de decidir.",
    opts:[
      {l:"😴 Es por el comportamiento o adaptación",next:"oc_devolver_comportamiento"},
      {l:"🏠 Es por el espacio o la convivencia en casa",next:"oc_devolver_espacio"},
      {l:"💰 Es por tiempo, dinero u otra razón personal",next:"oc_devolver_personal"},
      {l:"💬 Prefiero hablar con alguien del refugio",next:"oc_contacto"},
    ]
  },
  oc_devolver_comportamiento:{
    bot:"Tiene sentido — el comportamiento en los primeros días puede ser muy distinto al de unas semanas después, mientras la mascota se adapta. Cosas como llorar de noche, no comer bien o esconderse son parte normal del proceso, no señales de que algo salió mal.\n\n¿Querés que veamos juntos qué es específicamente lo que te está costando manejar?",
    opts:[{l:"🐶 Sí, es con un perro",next:"perro_llora"},{l:"🐱 Sí, es con un gato",next:"gato_dias"},{l:"🔄 Volver al inicio",next:"start"}]
  },
  oc_devolver_espacio:{
    bot:"Eso es muy válido — a veces la realidad del día a día no coincide con lo que se había imaginado, y el espacio o la convivencia con otras personas o mascotas puede ser más difícil de lo esperado.\n\nAntes de tomar una decisión final, puede ayudar hablar con alguien del refugio: a veces hay alternativas (como un período de adaptación más largo, o asesoramiento) que no son evidentes desde acá.",
    opts:[{l:"💬 Hablar con alguien del refugio",next:"oc_contacto"},{l:"🔄 Volver al inicio",next:"start"}]
  },
  oc_devolver_personal:{
    bot:"Gracias por contármelo con honestidad. Las razones personales — tiempo, economía, salud, cambios de vida — son tan válidas como cualquier otra, y no tenés que justificarte por eso.\n\nLo más importante ahora es que la transición sea lo más cuidada posible, tanto para vos como para la mascota. La organización o refugio que gestionó la adopción es quien mejor puede acompañarte en este paso.",
    opts:[{l:"💬 Hablar con alguien del refugio",next:"oc_contacto"},{l:"🔄 Volver al inicio",next:"start"}]
  },
  oc_no_se:{
    bot:"Esa es una pregunta muy específica, y la verdad es que no tengo la información precisa para responderte con seguridad — prefiero ser honesto antes que arriesgarme a darte un dato incorrecto.\n\nPara esto, tu veterinario de confianza es quien mejor te puede orientar.",
    opts:[{l:"🩺 Ayudame a encontrar un veterinario",next:"vet_pedir_direccion"},{l:"🔄 Volver al inicio",next:"start"}]
  },
  oc_enojado:{
    bot:"Tenés razón en frustrarte, y te pido disculpas si sentís que no te estoy dando una respuesta clara. Vamos a intentarlo de nuevo, de otra forma.",
    opts:[
      {l:"🐶 Mi tema es sobre un perro",next:"elige_perro"},
      {l:"🐱 Mi tema es sobre un gato",next:"elige_gato"},
      {l:"💬 Prefiero hablar con una persona",next:"oc_contacto"},
      {l:"🔄 Volver al inicio",next:"start"},
    ]
  },
  oc_pelea:{
    bot:"Eso debe haber sido muy estresante para vos y para ellos. Antes que nada: ¿están los dos bien físicamente, sin heridas que necesiten atención?",
    opts:[
      {l:"Sí, están bien físicamente",next:"oc_pelea_bien"},
      {l:"No, hay alguna herida",next:"vet_urgente"},
    ]
  },
  oc_pelea_bien:{
    bot:"Qué bueno que no haya heridas. Lo que pasó generalmente significa que avanzaron las fases de presentación demasiado rápido. No es un fracaso, es una señal de que hay que volver un paso atrás y separarlos un par de días antes de reintentar.",
    opts:[{l:"📋 Ver el proceso paso a paso",next:"multi_tiempo"},{l:"🔄 Volver al inicio",next:"start"}]
  },
  oc_prisa:{
    bot:"Directo al punto: revisá que tenga agua, que no esté encerrado en un espacio sin salida, y que la zona esté tranquila. Si eso ya está resuelto, escribime de nuevo cuando puedas y lo vemos con más detalle.",
    opts:[{l:"🔄 Volver al inicio",next:"start"},{l:"🙏 Gracias, eso resuelve",next:"oc_gracias_simple"}]
  },
  oc_repetida:{
    bot:"Veo que esto te sigue generando dudas, y está bien volver a preguntarlo — a veces una respuesta no termina de asentarse hasta la segunda vuelta. Vamos a verlo de nuevo, más despacio.",
    opts:[
      {l:"🐶 Es sobre un perro",next:"elige_perro"},
      {l:"🐱 Es sobre un gato",next:"elige_gato"},
      {l:"🔄 Volver al inicio",next:"start"},
    ]
  },
  oc_feliz:{
    bot:"¡Eso es hermoso! Esa señal es enorme — significa que tu mascota ya empezó a sentirse segura con vos.\n\nGuardá este momento, porque dentro de unas semanas vas a mirar para atrás y vas a ver lo lejos que llegaron juntos. ¡Felicitaciones por el esfuerzo que pusiste! 🐾",
    opts:[{l:"🔄 Volver al inicio",next:"start"},{l:"🙏 Gracias, eso resuelve",next:"oc_gracias_simple"}]
  },
  oc_contacto:{
    bot:"Por supuesto, no tenés que resolver esto solo/a. Dejame tu nombre y un teléfono o email de contacto, y una persona del refugio se va a comunicar con vos a la brevedad para acompañarte en esta decisión.\n\nEscribilo en el cuadro de texto de abajo (por ejemplo: \"Juan Pérez, 11-2345-6789\") 👇",
    opts:[],
    awaitInput:"contacto_datos"
  },
  oc_contacto_confirmado:{
    // bot text is set dynamically in code (includes the user's data)
    opts:[{l:"🔄 Volver al inicio",next:"start"}]
  },
  oc_gracias_simple:{
    bot:"¡De nada! Cualquier duda que surja, acá estoy 🐾",
    opts:[{l:"🔄 Volver al inicio",next:"start"}]
  },

  // ── CIERRE ─────────────────────────────────────
  cierre:{
    bot:"¡Genial! Ya tenés todo lo que necesitás para arrancar con el pie derecho 🐾\n\nRecordá: la adopción no es perfecta desde el primer día. Lo que hace la diferencia es la paciencia y la constancia.\n\n¿Hay algo más en lo que pueda ayudarte?",
    opts:[{l:"🔄 Empezar de nuevo",next:"start"},{l:"✅ No, gracias — tengo todo claro",next:"fin"}]
  },
  fin:{
    bot:"¡Mucha suerte con la llegada! Cuando quieras, volvé y seguimos.\n\nTu nueva compañía va a estar muy bien cuidada 🐾❤️",
    opts:[{l:"🔄 Nueva consulta",next:"start"}]
  },
};

let curNode="start";
let awaitingInput=null;
const chat=document.getElementById("chat");
const owrap=document.getElementById("owrap");
const chips=document.getElementById("chips");
const rbar=document.getElementById("rbar");
const cancelBar=document.getElementById("cancelBar");
const inpEl=document.getElementById("inp");

function linkify(text){
  const urlRegex=/(https?:\/\/[^\s]+)/g;
  return text.split(urlRegex).map(part=>{
    if(part.match(urlRegex)){
      const a=document.createElement("a");
      a.href=part;a.target="_blank";a.rel="noopener";
      a.textContent="📍 Abrir en Google Maps";
      a.style.color="var(--blue)";a.style.fontWeight="700";
      a.style.textDecoration="underline";a.style.display="inline-block";
      a.style.marginTop="2px";
      return a;
    }
    return document.createTextNode(part);
  });
}

function addMsg(text,who,delay=0){
  return new Promise(r=>setTimeout(()=>{
    const row=document.createElement("div");
    row.className="mrow "+who;
    if(who==="bot"){
      const av=document.createElement("div");
      av.className="mav";
      av.innerHTML=`<img src="${DOG}" alt="">`;
      row.appendChild(av);
    }
    const b=document.createElement("div");
    b.className="bub";
    if(text.includes("http")){
      linkify(text).forEach(node=>b.appendChild(node));
    }else{
      b.textContent=text;
    }
    row.appendChild(b);
    chat.appendChild(row);
    chat.scrollTop=chat.scrollHeight;
    r();
  },delay));
}

function showTyping(){
  const r=document.createElement("div");
  r.className="trow";r.id="typing";
  const av=document.createElement("div");
  av.className="mav";av.innerHTML=`<img src="${DOG}" alt="">`;
  r.appendChild(av);
  const b=document.createElement("div");
  b.className="tbub";
  b.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
  r.appendChild(b);chat.appendChild(r);chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){const t=document.getElementById("typing");if(t)t.remove();}

function showOpts(opts){
  chips.innerHTML="";
  opts.forEach(o=>{
    const btn=document.createElement("button");
    btn.className="chip wide";btn.textContent=o.l;
    btn.onclick=()=>pick(o);
    chips.appendChild(btn);
  });
  owrap.style.display="flex";
}
function hideOpts(){owrap.style.display="none";chips.innerHTML="";}

async function goTo(key){
  curNode=key;const node=F[key];if(!node)return;
  hideOpts();rbar.classList.remove("on");
  if(!node.awaitInput){
    awaitingInput=null;
    inpEl.placeholder="Escribí tu consulta...";
    cancelBar.classList.remove("on");
  }
  showTyping();
  await new Promise(r=>setTimeout(r,850+Math.random()*350));
  hideTyping();
  await addMsg(node.bot,"bot");
  if(node.awaitInput){
    awaitingInput=node.awaitInput;
    inpEl.placeholder=node.awaitInput==="contacto_datos"
      ? "Tu nombre y teléfono o email..."
      : "Escribí tu dirección o zona...";
    inpEl.focus();
    cancelBar.classList.add("on");
  } else if(node.opts&&node.opts.length){
    setTimeout(()=>showOpts(node.opts),280);
  } else {
    rbar.classList.add("on");
  }
}

async function pick(o){
  hideOpts();await addMsg(o.l,"user");
  setTimeout(()=>goTo(o.next),380);
}

async function sendText(){
  const t=inpEl.value.trim();if(!t)return;
  inpEl.value="";hideOpts();await addMsg(t,"user");

  // ── Caso especial: el chat está esperando una dirección ──
  if(awaitingInput==="vet_direccion"){
    awaitingInput=null;
    inpEl.placeholder="Escribí tu consulta...";
    cancelBar.classList.remove("on");
    showTyping();
    await new Promise(r=>setTimeout(r,900));
    hideTyping();
    const query=encodeURIComponent("veterinaria cerca de "+t);
    const mapsUrl="https://www.google.com/maps/search/?api=1&query="+query;
    F.vet_resultado.bot="¡Listo! Encontré veterinarias cerca de \""+t+"\".\n\n"+mapsUrl+"\n\nTocá el link de arriba para abrir Google Maps y ver las opciones más cercanas, horarios y teléfonos.\n\nSi es una emergencia grave, llamá antes de salir para confirmar que están atendiendo.";
    curNode="vet_resultado";
    await addMsg(F.vet_resultado.bot,"bot");
    setTimeout(()=>showOpts(F.vet_resultado.opts),280);
    return;
  }

  // ── Caso especial: el chat está esperando los datos de contacto ──
  if(awaitingInput==="contacto_datos"){
    awaitingInput=null;
    inpEl.placeholder="Escribí tu consulta...";
    cancelBar.classList.remove("on");
    showTyping();
    await new Promise(r=>setTimeout(r,900));
    hideTyping();
    F.oc_contacto_confirmado.bot="¡Gracias! Ya registré tus datos:\n\n\""+t+"\"\n\nUna persona del refugio se va a estar comunicando con vos a la brevedad para acompañarte en esto. No estás solo/a en esta decisión 🐾\n\nFue un gusto poder ayudarte hasta acá. ¡Mucha suerte!";
    curNode="oc_contacto_confirmado";
    await addMsg(F.oc_contacto_confirmado.bot,"bot");
    setTimeout(()=>showOpts(F.oc_contacto_confirmado.opts),280);
    return;
  }

  showTyping();
  await new Promise(r=>setTimeout(r,900));
  hideTyping();
  const l=t.toLowerCase();
  let reply="";

  // ── PRIORIDAD 1: Emergencia veterinaria ──
  if(l.includes("urgen")||l.includes("emergencia")||l.includes("no respira")||l.includes("no reacciona")){
    setTimeout(()=>goTo("vet_urgente"),300);
    return;

  // ── PRIORIDAD 2: Situaciones ocultas (las 8 de la Rueda de Byte) ──
  }else if(l.includes("devolver")||l.includes("devolverlo")||l.includes("devolverla")||l.includes("regalar")||l.includes("no puedo más")||l.includes("no puedo mas")||l.includes("entregar")||l.includes("refugio")){
    setTimeout(()=>goTo("oc_devolver"),300);
    return;
  }else if(l.includes("no sé")||l.includes("no se")||l.includes("no sabes")||l.includes("no tenés idea")||l.includes("raza")||l.includes("genétic")||l.includes("genetic")){
    setTimeout(()=>goTo("oc_no_se"),300);
    return;
  }else if(l.includes("no sirve")||l.includes("inútil")||l.includes("inutil")||l.includes("estoy harto")||l.includes("estoy harta")||l.includes("enojad")||l.includes("ya te pregunté lo mismo")||l.includes("ya te pregunte lo mismo")){
    setTimeout(()=>goTo("oc_enojado"),300);
    return;
  }else if(l.includes("pelearon")||l.includes("se pelearon")||l.includes("se atacaron")||l.includes("no se llevan")||l.includes("no se llevan bien")||l.includes("arañ")){
    setTimeout(()=>goTo("oc_pelea"),300);
    return;
  }else if(l.includes("apurada")||l.includes("apurado")||l.includes("rápido")||l.includes("rapido")||l.includes("no tengo tiempo")||l.includes("necesito ya")){
    setTimeout(()=>goTo("oc_prisa"),300);
    return;
  }else if(l.includes("ya pregunté")||l.includes("ya pregunte")||l.includes("ya te pregunté")||l.includes("ya te pregunte")||l.includes("otra vez")||l.includes("de nuevo lo mismo")||l.includes("ya te dije")){
    setTimeout(()=>goTo("oc_repetida"),300);
    return;
  }else if(l.includes("jugó por primera vez")||l.includes("jugo por primera vez")||l.includes("se está adaptando")||l.includes("se esta adaptando")||l.includes("genial")||l.includes("feliz")||l.includes("contenta")||l.includes("contento")){
    setTimeout(()=>goTo("oc_feliz"),300);
    return;

  // ── PRIORIDAD 3: Veterinario genérico (no urgente) ──
  }else if(l.includes("vet")||l.includes("médico")||l.includes("doctor")){
    reply="Entiendo, vamos a buscarte un veterinario cerca 🩺";
    setTimeout(()=>goTo("vet_pedir_direccion"),300);
    await addMsg(reply,"bot");
    return;

  // ── PRIORIDAD 4: Flujo general gato/perro ──
  }else if(l.includes("gato")||l.includes("felino")){
    reply="Para consultas sobre gatos, seguí el flujo de la opción 🐱";
    setTimeout(()=>showOpts([{l:"🐱 Tengo un gato adoptado",next:"gato_inicio"},{l:"Volver al inicio",next:"start"}]),300);
  }else if(l.includes("perro")||l.includes("canino")){
    reply="¡Claro! Los perros adoptados tienen un período de adaptación muy especial.";
    setTimeout(()=>showOpts([{l:"🐶 Mi perro llora de noche",next:"perro_llora"},{l:"Volver al inicio",next:"start"}]),300);
  }else if(l.includes("gracias")||l.includes("perfecto")||l.includes("listo")){
    reply="¡De nada! Cualquier duda que surja, acá estoy 🐾";rbar.classList.add("on");
  }else{
    reply="Usá las opciones de abajo para que pueda guiarte mejor 😊";
    const node=F[curNode];if(node&&node.opts)setTimeout(()=>showOpts(node.opts),300);
  }
  await addMsg(reply,"bot");
}

function restart(){
  chat.innerHTML="";hideOpts();
  rbar.classList.remove("on");
  cancelBar.classList.remove("on");
  awaitingInput=null;
  inpEl.placeholder="Escribí tu consulta...";
  const d=document.createElement("div");d.className="divider";d.textContent="Nueva conversación";
  chat.appendChild(d);goTo("start");
}

goTo("start");
</script>
